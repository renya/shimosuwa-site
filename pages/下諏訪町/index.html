 <div class="tags">

 </div>

    <p class="description">
        明治7年(1874)年、下諏訪町、友之町、下原村、久保村、武井村、富部村、高木村で下諏訪村が発足。明治22年(1889)年、町村制施行により下諏訪村発足。明治26年(1893)、町制施行、下諏訪町となる。昭和33年(1958)、東町地籍と東山田地籍が岡谷市より編入。昭和58年(1983)、諏訪湖の面積分割を行う。
    </p>

    <p class="description">
        小学校の町立南小学校、北小学校と中学校の町立下諏訪中学校と社中学校は学区を一にしている。
    </p>
