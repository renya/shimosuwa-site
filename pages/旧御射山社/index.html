    <p class="description">
旧御射山社(もとみさやましゃ)は江戸時代中期元禄年間に秋宮近くの山中に移されるまでの跡地。
太古、御射山祭が行われていた場所。
霧ケ峯本御射山神社とも呼ばれる。
毎年9月27日に諏訪大社の神職も訪れ例祭が行われる。
    </p>
