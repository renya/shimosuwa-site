    <p class="description">
        8月1日に御霊代を<a href="/pages/春宮/">春宮</a>から<a href="/pages/秋宮/">秋宮</a>へ移す遷座祭。<br>
        御頭郷が奉仕する柴舟の曳行がある事からお舟祭りと呼ばれています。<br>
        柴舟は春宮から下馬橋を通り、春宮大門へ。国道20号、通称大社通りを進む。四つ角から八幡坂を登り、太鼓橋を渡り、秋宮境内へ。寝入りの杉を通りすぎ、神楽殿を右回りに3周して終ります。
    </p>
