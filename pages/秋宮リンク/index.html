    <p class="description">
      町営ふれあい広場秋宮スケートリンクは諏訪大社下社秋宮の森の北側にある天然のスケートリンク場。<br>
      明治42(1909)年に諏訪湖水滑会と有志により開設。日本初のフィギュアスケート(1922年)、アイスホッケー(1923年)、カーリング(1937年)の大会が行われた。<br>
      開場期間は1月中旬から2月中旬まで。昨今は暖冬の影響の為か期間の短縮や開場出来ない事も多い。
    </p>
