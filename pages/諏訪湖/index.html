    <h1>諏訪湖</h1>

    <div class="tag">スポット</div>


    <p class="description">
        諏訪湖は、海抜759メートル、周囲約16キロメートル、面積13.3平方キロメートル、水深約7メートルの長野県のほぼ中央に位置する同県最大の湖で、天竜川の源でもあります。大小31本の川が注ぎ込みますが、流れ出る川は天竜川1本です。<br>
        諏訪湖では鯉(こい)や鮒(ふな)、公魚(わかさぎ)などの釣りも楽しめます。<br>
        明治期にはここでスケートが発達。日本のスケート競技発祥の地となっています。<br>
        <a href="/pages/御神渡り/">御神渡り</a>も有名です。
    </p>
