<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>気づいたこと・情報提供｜shimosuwa.info</title>
  <meta name="description" content="shimosuwa.infoへの情報提供・修正依頼・お問い合わせフォームです。">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0b0b0f;
      color: #ffffff;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #bbb;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    a.back {
      display: inline-block;
      margin-bottom: 30px;
      color: #7aa2ff;
      text-decoration: none;
      font-size: 14px;
    }

    a.back:hover {
      text-decoration: underline;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input,
    textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
    }

    button {
      padding: 12px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    button:hover {
      background: #1a1a1a;
    }

    .note {
      font-size: 14px;
      color: #999;
      margin-top: -14px;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>

  <div class="container">

    <a class="back" href="/">← トップへ戻る</a>

    <h1>気づいたこと・情報提供</h1>

    <p>
      間違いの指摘や追加情報、気づいたことなどがあれば、お気軽にお知らせください。ご質問・ご連絡もこちらからどうぞ。
    </p>

    <p class="note">
      一言だけでも大歓迎です。
    </p>

    <form action="https://api.web3forms.com/submit" method="POST">

      <!-- NOTE: 送信後は必ずthanksページへ遷移 -->
      <input type="hidden" name="redirect" value="https://shimosuwa.info/contact/thanks.html">

      <!-- Web3Forms Access Key -->
      <input type="hidden" name="access_key" value="33179994-b80e-4f80-8195-b50fd295c1f5">

      <!-- 件名 -->
      <input type="hidden" name="subject" value="shimosuwa.info 情報提供・お問い合わせ">

      <input type="text" name="name" placeholder="お名前（任意）">

      <input type="email" name="email" placeholder="メールアドレス（任意）">

      <textarea name="message" placeholder="内容" rows="6" required></textarea>

      <input type="checkbox" name="botcheck" style="display:none;">

      <button type="submit">
        送信
      </button>

    </form>

  </div>

</body>
</html>
