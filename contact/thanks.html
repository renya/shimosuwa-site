      align-items: center;

      color: #555;

    a.button {
      display: inline-block;
      padding: 12px 18px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.2s;
    }

    a.button:hover {
      opacity: 0.8;
    }
